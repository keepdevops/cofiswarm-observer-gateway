# Per-repo CI — build + vet + test (Go 1.25).
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GOPRIVATE: github.com/keepdevops/*
  GONOSUMDB: github.com/keepdevops/*

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: go.sum
      - name: Go private modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - name: Build, vet, test
        run: |
          set -euo pipefail
          GOWORK=off go build ./...
          GOWORK=off go vet ./...
          GOWORK=off go test ./...
